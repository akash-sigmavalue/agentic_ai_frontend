version: 0.0
os: linux

files:
  - source: /
    destination: /opt/agentic-ai/deployments/frontend

hooks:
  AfterInstall:
    - location: scripts/frontend_after_install.sh
      timeout: 900
      runas: ubuntu

  ValidateService:
    - location: scripts/frontend_validate.sh
      timeout: 120
      runas: ubuntu